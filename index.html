<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>分鏡討論板 (Storyboard) v260624.8</title><style>:root{--bg-color:#f7f9fc;--text-color:#333;--panel-bg:#fff;--panel-border:#eee;--frame-border:#000;--frame-bg:#fff;--arrow-color:#333;--placeholder-color:#aaa}body.dark-mode{--bg-color:#1a1a24;--text-color:#e0e0e0;--panel-bg:#2d2d3b;--panel-border:#444;--frame-border:#555;--frame-bg:#222;--arrow-color:#888;--placeholder-color:#666}*{box-sizing:border-box;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif}body{background-color:var(--bg-color);color:var(--text-color);padding:30px;margin:0;padding-bottom:120px;transition:background-color .3s ease,color .3s ease}.header-wrapper{text-align:center;margin-bottom:30px}h1{display:inline-block;margin:0;cursor:default}.version-tag{font-size:15px;font-weight:normal;color:var(--placeholder-color);opacity:0;transition:opacity .3s ease;margin-left:10px;pointer-events:none}h1:hover .version-tag{opacity:1}.controls-panel{position:fixed;top:20px;right:30px;background:var(--panel-bg);padding:6px 10px;border-radius:6px;box-shadow:0 2px 10px rgba(0,0,0,.15);border:1px solid var(--panel-border);display:flex;gap:6px;z-index:100;align-items:center;transition:all .3s ease}.control-btn{font-size:13px;padding:6px 8px;border:1px solid #ccc;background-color:var(--panel-bg);color:var(--text-color);border-radius:4px;cursor:pointer;display:flex;justify-content:center;align-items:center;transition:all .2s;font-weight:bold}.control-btn:hover:not(:disabled){background-color:#e6f0ff;border-color:#0066ff;color:#0066ff}.control-btn:disabled{background-color:transparent;color:#888;border-color:#888;cursor:not-allowed;opacity:.5}.divider{width:1px;height:20px;background-color:var(--panel-border);margin:0 2px}.storyboard-container{display:grid;gap:30px 40px;max-width:1400px;margin:0 auto;transition:all .3s ease}.storyboard-container.cols-5{grid-template-columns:repeat(5,1fr)}.storyboard-container.cols-4{grid-template-columns:repeat(4,1fr)}.storyboard-container.cols-3{grid-template-columns:repeat(3,1fr)}.storyboard-container.cols-2{grid-template-columns:repeat(2,1fr)}.frame-wrapper{display:flex;flex-direction:column;align-items:center;position:relative}.frame-wrapper::after{content:'➔';position:absolute;right:-26px;top:38%;transform:translateY(-50%);font-size:24px;color:var(--arrow-color);font-weight:bold;pointer-events:none;z-index:1;transition:color .3s ease}.add-frame-btn{position:absolute;right:-22px;top:62%;transform:translateY(-50%);width:22px;height:22px;background:var(--panel-bg);border:2px solid #ccc;border-radius:50%;cursor:pointer;display:flex;justify-content:center;align-items:center;font-size:14px;color:var(--text-color);box-shadow:0 2px 4px rgba(0,0,0,.1);transition:all .2s;z-index:10;padding:0}.add-frame-btn:hover{border-color:#0066ff;color:#0066ff;transform:translateY(-50%) scale(1.15)}.storyboard-container.cols-5 .frame-wrapper:nth-child(5n)::after,.storyboard-container.cols-4 .frame-wrapper:nth-child(4n)::after,.storyboard-container.cols-3 .frame-wrapper:nth-child(3n)::after,.storyboard-container.cols-2 .frame-wrapper:nth-child(2n)::after,.frame-wrapper:last-child::after,.storyboard-container.cols-5 .frame-wrapper:nth-child(5n) .add-frame-btn,.storyboard-container.cols-4 .frame-wrapper:nth-child(4n) .add-frame-btn,.storyboard-container.cols-3 .frame-wrapper:nth-child(3n) .add-frame-btn,.storyboard-container.cols-2 .frame-wrapper:nth-child(2n) .add-frame-btn,.frame-wrapper:last-child .add-frame-btn{display:none}.image-box{width:100%;aspect-ratio:16/9;border:4px solid var(--frame-border);background-color:var(--frame-bg);display:flex;justify-content:center;align-items:center;cursor:grab;background-size:cover;background-position:center;background-repeat:no-repeat;transition:border-color .2s ease,transform .2s ease;position:relative;overflow:hidden}.image-box .placeholder-text{color:var(--placeholder-color);font-size:13px;pointer-events:none}.image-box:active{cursor:grabbing}.image-box.drag-over{transform:scale(1.05);z-index:10}.image-box.drag-over::before,.image-box.drag-over::after{position:absolute;top:0;bottom:0;display:flex;justify-content:center;align-items:center;font-size:20px;font-weight:bold;color:#fff;z-index:20;pointer-events:none;text-shadow:1px 1px 4px rgba(0,0,0,.8)}.image-box.drag-over::before{content:'🔁 替換';left:0;width:50%;background-color:rgba(0,0,0,.4);border-right:2px dashed rgba(255,255,255,.5)}.image-box.drag-over::after{content:'⤵️ 插入';right:0;width:50%;background-color:rgba(0,0,0,.4)}.image-box.drag-over-left{border-color:#0066ff!important;box-shadow:-5px 4px 15px rgba(0,102,255,.5)}.image-box.drag-over-left::before{background-color:rgba(0,102,255,.85)}.image-box.drag-over-right{border-color:#28a745!important;box-shadow:5px 4px 15px rgba(40,167,69,.5)}.image-box.drag-over-right::after{background-color:rgba(40,167,69,.85)}.frame-number{margin-top:10px;font-size:18px;font-weight:bold;transition:font-size .3s ease}.storyboard-container.cols-2 .frame-number{font-size:24px}.storyboard-container.cols-3 .frame-number{font-size:20px}.trash-can{position:fixed;bottom:30px;right:30px;width:100px;height:100px;background-color:#ff4d4d;border:3px dashed #900;border-radius:12px;display:flex;flex-direction:column;justify-content:center;align-items:center;color:#fff;font-weight:bold;font-size:14px;box-shadow:0 5px 15px rgba(0,0,0,.2);transition:all .3s ease;z-index:100}.trash-can span{font-size:32px;margin-bottom:5px;pointer-events:none}.trash-can.drag-over{background-color:#ff1a1a;transform:scale(1.15);border-color:#fff;box-shadow:0 10px 25px rgba(255,0,0,.5)}@media print{@page{margin:0}*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}body{background-color:#fff!important;padding:15mm;margin:0}.controls-panel,.trash-can,.add-frame-btn,.header-wrapper{display:none!important}.storyboard-container{gap:20px 25px}.frame-wrapper{page-break-inside:avoid;break-inside:avoid}.image-box{border-color:#000!important}.frame-number{color:#000!important}.frame-wrapper::after{color:#000!important}.hide-for-print{display:none!important}.last-visible-frame::after{display:none!important}}</style></head><body class="dark-mode"><div class="header-wrapper"><h1>🎬 分鏡討論板<span class="version-tag">v260624.8 by WDC</span></h1></div><div class="controls-panel"><button id="btn-theme" class="control-btn" title="切換深色/淺色模式">☀️ 淺色</button><div class="divider"></div><label for="input-load" class="control-btn" title="讀取專案檔">📂 讀取</label><input type="file" id="input-load" accept=".json" style="display:none;"><button id="btn-save" class="control-btn" title="打包下載專案">💾 儲存</button><div class="divider"></div><button id="btn-zoom-in" class="control-btn" title="放大">➕</button><button id="btn-zoom-out" class="control-btn" title="縮小" disabled>➖</button><div class="divider"></div><button id="btn-export-pdf" class="control-btn" title="匯出成 PDF 檔案" style="background-color:#ffe6e6;border-color:#ff9999;color:#c00">📄 匯出 PDF</button></div><div class="trash-can" id="trash-can"><span>🗑️</span>移除</div><div class="storyboard-container cols-5" id="storyboard"></div><script>document.addEventListener('DOMContentLoaded',()=>{const storyboard=document.getElementById('storyboard');const trashCan=document.getElementById('trash-can');const btnZoomIn=document.getElementById('btn-zoom-in');const btnZoomOut=document.getElementById('btn-zoom-out');const btnSave=document.getElementById('btn-save');const inputLoad=document.getElementById('input-load');const btnTheme=document.getElementById('btn-theme');const btnExportPdf=document.getElementById('btn-export-pdf');const minFrames=40;let draggedElement=null;let currentCols=5;btnTheme.addEventListener('click',()=>{document.body.classList.toggle('dark-mode');if(document.body.classList.contains('dark-mode')){btnTheme.innerHTML='☀️ 淺色';}else{btnTheme.innerHTML='🌙 深色';}});btnExportPdf.addEventListener('click',()=>{const wrappers=document.querySelectorAll('.frame-wrapper');let lastUsedIndex=-1;wrappers.forEach((wrapper,index)=>{const bg=wrapper.querySelector('.image-box').style.backgroundImage;if(bg&&bg!=='none'&&bg!==''){lastUsedIndex=index;}});if(lastUsedIndex>=0){wrappers[lastUsedIndex].classList.add('last-visible-frame');}wrappers.forEach((wrapper,index)=>{if(index>lastUsedIndex){wrapper.classList.add('hide-for-print');}});const originalCols=currentCols;if(currentCols===5){currentCols=4;updateZoom();}window.print();setTimeout(()=>{currentCols=originalCols;updateZoom();if(lastUsedIndex>=0){wrappers[lastUsedIndex].classList.remove('last-visible-frame');}wrappers.forEach(w=>w.classList.remove('hide-for-print'));},100);});function updateZoom(){storyboard.className=`storyboard-container cols-${currentCols}`;btnZoomIn.disabled=(currentCols===2);btnZoomOut.disabled=(currentCols===5);}btnZoomIn.addEventListener('click',()=>{if(currentCols>2){currentCols--;updateZoom();}});btnZoomOut.addEventListener('click',()=>{if(currentCols<5){currentCols++;updateZoom();}});function updateAllFrameNumbers(){const wrappers=document.querySelectorAll('.frame-wrapper');wrappers.forEach((wrapper,index)=>{wrapper.querySelector('.frame-number').textContent=index+1;});}function createFrameElement(){const wrapper=document.createElement('div');wrapper.className='frame-wrapper';const imgBox=document.createElement('div');imgBox.className='image-box';imgBox.draggable=true;imgBox.innerHTML='<span class="placeholder-text">點擊或拖曳至此</span>';const fileInput=document.createElement('input');fileInput.type='file';fileInput.accept='image/*';fileInput.style.display='none';const numberLabel=document.createElement('div');numberLabel.className='frame-number';const addBtn=document.createElement('button');addBtn.className='add-frame-btn';addBtn.title='在此插入新分鏡';addBtn.innerHTML='➕';function handleFile(file,targetBox){if(file&&file.type.startsWith('image/')){const reader=new FileReader();reader.onload=function(event){const img=new Image();img.onload=function(){const MAX_DIMENSION=1280;let width=img.width;let height=img.height;if(width>height&&width>MAX_DIMENSION){height*=MAX_DIMENSION/width;width=MAX_DIMENSION;}else if(height>MAX_DIMENSION){width*=MAX_DIMENSION/height;height=MAX_DIMENSION;}const canvas=document.createElement('canvas');canvas.width=width;canvas.height=height;const ctx=canvas.getContext('2d');ctx.drawImage(img,0,0,width,height);const compressedDataUrl=canvas.toDataURL('image/jpeg',0.7);targetBox.style.backgroundImage=`url(${compressedDataUrl})`;targetBox.querySelector('.placeholder-text').style.display='none';};img.src=event.target.result;}reader.readAsDataURL(file);}}imgBox.addEventListener('click',()=>fileInput.click());fileInput.addEventListener('change',(e)=>{handleFile(e.target.files[0],imgBox);e.target.value='';});imgBox.addEventListener('dragstart',(e)=>{draggedElement=imgBox;setTimeout(()=>imgBox.style.opacity='0.4',0);});imgBox.addEventListener('dragend',()=>{setTimeout(()=>{if(draggedElement)draggedElement.style.opacity='1';draggedElement=null;document.querySelectorAll('.image-box').forEach(box=>{box.classList.remove('drag-over','drag-over-left','drag-over-right');});trashCan.classList.remove('drag-over');},0);});imgBox.addEventListener('dragover',(e)=>{e.preventDefault();if(draggedElement===imgBox)return;imgBox.classList.add('drag-over');const rect=imgBox.getBoundingClientRect();const x=e.clientX-rect.left;if(x<rect.width/2){imgBox.classList.add('drag-over-left');imgBox.classList.remove('drag-over-right');}else{imgBox.classList.add('drag-over-right');imgBox.classList.remove('drag-over-left');}});imgBox.addEventListener('dragleave',()=>{imgBox.classList.remove('drag-over','drag-over-left','drag-over-right');});imgBox.addEventListener('drop',(e)=>{e.preventDefault();const isLeft=imgBox.classList.contains('drag-over-left');imgBox.classList.remove('drag-over','drag-over-left','drag-over-right');if(e.dataTransfer.files&&e.dataTransfer.files.length>0){if(isLeft){handleFile(e.dataTransfer.files[0],imgBox);}else{const newFrame=createFrameElement();wrapper.after(newFrame);handleFile(e.dataTransfer.files[0],newFrame.querySelector('.image-box'));updateAllFrameNumbers();}return;}if(draggedElement&&draggedElement!==imgBox){if(isLeft){const tempBg=imgBox.style.backgroundImage;imgBox.style.backgroundImage=draggedElement.style.backgroundImage;draggedElement.style.backgroundImage=tempBg;const thisText=imgBox.querySelector('.placeholder-text');const draggedText=draggedElement.querySelector('.placeholder-text');const tempDisplay=thisText.style.display;thisText.style.display=draggedText.style.display;draggedText.style.display=tempDisplay;}else{const draggedWrapper=draggedElement.closest('.frame-wrapper');wrapper.after(draggedWrapper);updateAllFrameNumbers();}}});addBtn.addEventListener('click',()=>{const newFrame=createFrameElement();wrapper.after(newFrame);updateAllFrameNumbers();});wrapper.appendChild(imgBox);wrapper.appendChild(fileInput);wrapper.appendChild(numberLabel);wrapper.appendChild(addBtn);return wrapper;}for(let i=0;i<minFrames;i++){storyboard.appendChild(createFrameElement());}updateAllFrameNumbers();trashCan.addEventListener('dragover',(e)=>{e.preventDefault();trashCan.classList.add('drag-over');});trashCan.addEventListener('dragleave',()=>{trashCan.classList.remove('drag-over');});trashCan.addEventListener('drop',(e)=>{e.preventDefault();trashCan.classList.remove('drag-over');if(draggedElement){const wrapperToRemove=draggedElement.closest('.frame-wrapper');wrapperToRemove.remove();const currentCount=document.querySelectorAll('.frame-wrapper').length;if(currentCount<minFrames){storyboard.appendChild(createFrameElement());}updateAllFrameNumbers();}});btnSave.addEventListener('click',()=>{const framesData=[];const allBoxes=document.querySelectorAll('.image-box');allBoxes.forEach(box=>{framesData.push(box.style.backgroundImage);});const dataStr=JSON.stringify(framesData);const blob=new Blob([dataStr],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='分鏡專案檔.json';a.click();URL.revokeObjectURL(url);alert('專案已下載！因為有自動壓縮功能，現在的 JSON 檔案會非常輕量。');});inputLoad.addEventListener('change',(e)=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=function(event){try{const framesData=JSON.parse(event.target.result);storyboard.innerHTML='';const targetCount=Math.max(minFrames,framesData.length);for(let i=0;i<targetCount;i++){const newFrame=createFrameElement();storyboard.appendChild(newFrame);if(framesData[i]&&framesData[i]!=='none'&&framesData[i]!==''){const imgBox=newFrame.querySelector('.image-box');imgBox.style.backgroundImage=framesData[i];imgBox.querySelector('.placeholder-text').style.display='none';}}updateAllFrameNumbers();alert('專案讀取成功！');}catch(err){alert('檔案格式錯誤，無法讀取。請確認上傳的是分鏡專案檔 (.json)');}};reader.readAsText(file);e.target.value='';});window.addEventListener('dragover',(e)=>e.preventDefault());window.addEventListener('drop',(e)=>e.preventDefault());});</script></body></html>
